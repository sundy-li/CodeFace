name: Bug report
description: Report a reproducible CodeFace problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials or private Codex data. Report security issues privately through the Security tab.
  - type: input
    id: version
    attributes:
      label: CodeFace version
      placeholder: v1.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected result and the actual result.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open CodeFace\n2. Select a theme\n3. ..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove credentials and private data before attaching anything.
