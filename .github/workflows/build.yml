name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask package
      - run: ditto -c -k --sequesterRsrc --keepParent "dist/CodeFace.app" "dist/CodeFace-macos.zip"
      - uses: actions/upload-artifact@v5
        with:
          name: CodeFace-macOS
          path: dist/CodeFace-macos.zip
          if-no-files-found: error

  windows:
    name: Build Windows app
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask package
      - name: Archive Windows application
        shell: pwsh
        run: Compress-Archive -Path "dist/windows/CodeFace.exe", "dist/windows/CodeFace.ico" -DestinationPath "dist/CodeFace-Windows.zip"
      - uses: actions/upload-artifact@v5
        with:
          name: CodeFace-Windows
          path: dist/CodeFace-Windows.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: CodeFace-*
          path: release
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.zip --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "CodeFace $GITHUB_REF_NAME"
