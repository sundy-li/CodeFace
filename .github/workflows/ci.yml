name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  macos:
    name: macOS test, lint, and package
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo xtask package
      - name: Archive application bundle
        run: ditto -c -k --sequesterRsrc --keepParent "dist/CodeFace.app" "dist/CodeFace-macos.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: CodeFace-macOS-${{ github.sha }}
          path: dist/CodeFace-macos.zip
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Windows test and package
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked
      - run: cargo xtask package
      - uses: actions/upload-artifact@v7
        with:
          name: CodeFace-Windows-${{ github.sha }}
          path: |
            dist/windows/CodeFace.exe
            dist/windows/CodeFace.ico
          if-no-files-found: error
          retention-days: 7
